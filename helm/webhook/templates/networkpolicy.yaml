apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webhook.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "webhook.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow kube-apiserver to call the webhook on HTTPS (8443)
    - ports:
        - port: 8443
          protocol: TCP
    # Allow Prometheus scraping on /metrics
    - ports:
        - port: 8443
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

  egress:
    # Allow DNS resolution only
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
